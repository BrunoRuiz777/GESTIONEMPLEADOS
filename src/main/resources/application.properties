spring.application.name=GESTIONEMPLEADOS

# Tu conexión ganadora a MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/gestion_empleados_db
spring.datasource.username=TU_USUARIO
spring.datasource.password=TU_CONTRASEÑA
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# La magia de Hibernate
# 'update' creará las tablas de Empleado, Gerente, etc. automáticamente sin borrar datos previos
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true